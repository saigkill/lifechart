<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background: deep blue rounded square -->
  <rect width="512" height="512" rx="112" fill="#1E5A96"/>

  <!-- Upper half lighter tint (elevated mood zone) -->
  <rect x="0" y="0" width="512" height="256" rx="112" fill="#2471B8"/>
  <rect x="0" y="80" width="512" height="176" fill="#2471B8"/>

  <!-- Lower half darker tint (depression zone) -->
  <rect x="0" y="256" width="512" height="256" rx="0" fill="#174D82"/>
  <rect x="0" y="256" width="512" height="144" fill="#174D82"/>
  <rect x="0" y="400" width="512" height="112" rx="112" fill="#1A5490"/>

  <!-- Zero line -->
  <line x1="36" y1="256" x2="476" y2="256"
        stroke="white" stroke-width="2.5" stroke-opacity="0.22"/>

  <!-- Grid lines -->
  <line x1="36" y1="160" x2="476" y2="160"
        stroke="white" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="36" y1="352" x2="476" y2="352"
        stroke="white" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Functionality curve (warm orange) -->
  <polyline
    points="44,340 108,290 172,255 222,218 272,188 322,222 372,268 422,238 468,208"
    fill="none"
    stroke="#F5A33A"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Mood curve (sky blue / teal) -->
  <polyline
    points="44,300 100,248 158,200 210,228 268,276 316,238 368,185 420,208 468,168"
    fill="none"
    stroke="#7DD4F5"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Heart symbol (centered, upper area) -->
  <path d="M256 142
           C256 118 236 104 218 104
           C196 104 182 120 182 140
           C182 168 256 200 256 200
           C256 200 330 168 330 140
           C330 120 316 104 294 104
           C276 104 256 118 256 142 Z"
        fill="white" fill-opacity="0.88"/>

</svg>
