name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches: [ "develop", "main" ]

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'      
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
           versionSpec: '6.7.x'
      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0      
      - name: Install MAUI workload
        run: dotnet workload install maui-tizen
      - name: Restore
        run: dotnet restore src/LifeChart.Tests/LifeChart.Tests.csproj
      - name: Build
        run: dotnet build src/LifeChart.Tests/LifeChart.Tests.csproj --no-restore --configuration Release
      - name: Test
        run: dotnet test src/LifeChart.Tests/LifeChart.Tests.csproj --no-build --verbosity normal --collect:"XPlat Code Coverage" --logger:"junit;LogFilePath=junit.xml" /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura --results-directory ./TestResults --configuration Release      
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2
        if: always()
        with:
           files: "**/junit.xml"
      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # 5
        with:
           reports: ./TestResults/**/coverage.cobertura.xml
           targetdir: ./TestResults/CoverageReport
           reporttypes: Html;MarkdownSummaryGithub
      - name: Write Coverage to Job Summary
        run: cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
           name: coverage-report
           path: ./TestResults/CoverageReport
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
           path: ./TestResults/CoverageReport      
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  android:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: '6.7.x'
      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0      
      - name: Install MAUI workload
        run: dotnet workload install maui-android
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        run: echo "$ANDROID_KEYSTORE_B64" | base64 -d > lifechart.keystore
      - name: Build Play Store APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          dotnet publish src/LifeChart/LifeChart.csproj \
            -f net10.0-android36.1 \
            -c Release \
            -o out/google \
            /p:DefineConstants="GOOGLE_SERVICES" \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore=../../lifechart.keystore \
            /p:AndroidSigningKeyAlias=$KEY_ALIAS \
            /p:AndroidSigningKeyPass=$KEY_PASSWORD \
            /p:AndroidSigningStorePass=$KEY_PASSWORD
          for f in out/google/*.apk; do
            base=$(basename "$f" .apk)
            mv "$f" "out/google/${base}-google.apk"
          done
      - name: Build F-Droid APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          dotnet publish src/LifeChart/LifeChart.csproj \
            -f net10.0-android36.1 \
            -c Release \
            -o out/fdroid \
            /p:DefineConstants="FDROID" \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore=../../lifechart.keystore \
            /p:AndroidSigningKeyAlias=$KEY_ALIAS \
            /p:AndroidSigningKeyPass=$KEY_PASSWORD \
            /p:AndroidSigningStorePass=$KEY_PASSWORD
          for f in out/fdroid/*.apk; do
            base=$(basename "$f" .apk)
            mv "$f" "out/fdroid/${base}-fdroid.apk"
          done
      - name: Upload APKs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-apks
          path: '**/*.apk'

  windows:
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: '0'
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: '6.7.x'
      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
      - name: Install MAUI workload
        run: dotnet workload install maui-windows
      - name: Restore
        run: dotnet restore src/LifeChart/LifeChart.csproj
      - name: Build Windows
        run: |
          dotnet publish src/LifeChart/LifeChart.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -o out/windows          
      - name: Archive Release Linux
        uses: thedoctor0/zip-release@7fddfdd07cadb5b8c6c0dbcdcec17f8cd7784b80 # 0.7.5
        with:
          type: 'zip'
          filename: lifechart-windows-${{ env.majorMinorPatch }}.zip
          path: ./out/windows
          exclusions: '*.git*'
      - name: Upload ZIP
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-zip
          path: '**/*.zip'

  linux:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: '0'
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: '6.7.x'
      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0      
      - name: Install MAUI workload
        run: dotnet workload install maui-tizen android
      - name: Install GTK4 runtime libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-1 \
            libglib2.0-0 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0
      - name: Publish Linux
        run: |
          dotnet publish src/LifeChart.Linux/LifeChart.Linux.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -o out/linux
      - name: Install dotnetpackager
        run: |
          dotnet tool install --global DotnetPackaging.Tool
      - name: Build DEB
        run: |
          dotnetpackager deb from-project \
            --project ./src/LifeChart.Linux/LifeChart.Linux.csproj \
            --appId com.github.saigkill.lifechart \
            --appName LifeChart \
            --summary "LifeChart is a simple and lightweight desktop application for tracking your daily activities and habits." \
            --output ./LifeChart_${{ env.majorMinorPatch }}_amd64.deb 
      - name: Build RPM
        run: |
          dotnetpackager rpm from-project \
            --project ./src/LifeChart.Linux/LifeChart.Linux.csproj \
            --appId com.github.saigkill.lifechart \
            --appName LifeChart \
            --summary "LifeChart is a simple and lightweight desktop application for tracking your daily activities and habits." \
            --output ./LifeChart-${{ env.majorMinorPatch }}.x86_64.rpm
      - name: Build AppImage
        run: |
          dotnetpackager appimage from-project \
            --project ./src/LifeChart.Linux/LifeChart.Linux.csproj \
            --appId com.github.saigkill.lifechart \
            --appName LifeChart \
            --summary "LifeChart is a simple and lightweight desktop application for tracking your daily activities and habits." \
            --output ./LifeChart-${{ env.majorMinorPatch }}.appimage
      - name: Archive Release Linux
        uses: thedoctor0/zip-release@7fddfdd07cadb5b8c6c0dbcdcec17f8cd7784b80 # 0.7.5
        with:
          type: 'zip'
          filename: lifechart-linux-${{ env.majorMinorPatch }}.zip
          path: ./out/linux
          exclusions: '*.git*'
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-artifacts
          path: |
            ./LifeChart_*.deb
            ./LifeChart-*.x86_64.rpm
            ./LifeChart-*.appimage
            ./lifechart-linux-*.zip

  release:
    runs-on: ubuntu-latest
    needs: [android, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-apks
          path: release-artifacts
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-zip
          path: release-artifacts
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-artifacts
          path: release-artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/**/*.apk
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.appimage