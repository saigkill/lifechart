name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/LifeChart.Tests/LifeChart.Tests.csproj

      - name: Test
        run: dotnet test src/LifeChart.Tests/LifeChart.Tests.csproj --no-restore

  android:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > lifechart.keystore

      - name: Build Play Store APK
        run: |
          dotnet publish src/LifeChart/LifeChart.csproj \
            -f net10.0-android \
            -c Release \
            /p:DefineConstants="GOOGLE_SERVICES" \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore=../../lifechart.keystore \
            /p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} \
            /p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} \
            /p:AndroidSigningStorePass=${{ secrets.KEY_PASSWORD }}

      - name: Build F-Droid APK
        run: |
          dotnet publish src/LifeChart/LifeChart.csproj \
            -f net10.0-android \
            -c Release \
            /p:DefineConstants="FDROID" \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore=../../lifechart.keystore \
            /p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} \
            /p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} \
            /p:AndroidSigningStorePass=${{ secrets.KEY_PASSWORD }}

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: '**/*.apk'

  windows:
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Build Windows
        run: |
          dotnet publish src/LifeChart/LifeChart.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: '**/*.msix'
