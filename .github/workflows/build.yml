name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches: [ "develop", "main" ]

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'      
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
           versionSpec: '6.7.x'
      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@v4.5.0
      - name: BuilddirProps
        env:
          DIRECTORYPROPS: ${{ secrets.DIRECTORYPROPS }}
        run: printf '%s' "$DIRECTORYPROPS" > src/Directory.Build.props.user
      - name: Install MAUI workload
        run: dotnet workload install maui-tizen
      - name: Restore
        run: dotnet restore src/LifeChart.Tests/LifeChart.Tests.csproj
      - name: Build
        run: dotnet build src/LifeChart.Tests/LifeChart.Tests.csproj --no-restore --configuration Release
      - name: Test
        run: dotnet test src/LifeChart.Tests/LifeChart.Tests.csproj --no-build --verbosity normal --collect:"XPlat Code Coverage" --logger:"junit;LogFilePath=junit.xml" /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura --results-directory ./TestResults --configuration Release      
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
           files: "**/junit.xml"
      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
           reports: ./TestResults/**/coverage.cobertura.xml
           targetdir: ./TestResults/CoverageReport
           reporttypes: Html;MarkdownSummaryGithub
      - name: Write Coverage to Job Summary
        run: cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
           name: coverage-report
           path: ./TestResults/CoverageReport
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
           path: ./TestResults/CoverageReport      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  android:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'
      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@v4.5.0
      - name: BuilddirProps
        env:
          DIRECTORYPROPS: ${{ secrets.DIRECTORYPROPS }}
        run: printf '%s' "$DIRECTORYPROPS" > src/Directory.Build.props.user
      - name: Install MAUI workload
        run: dotnet workload install maui-android
      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > lifechart.keystore
      - name: Build Play Store APK
        run: |
          dotnet publish src/LifeChart/LifeChart.csproj \
            -f net10.0-android \
            -c Release \
            /p:DefineConstants="GOOGLE_SERVICES" \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore=../../lifechart.keystore \
            /p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} \
            /p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} \
            /p:AndroidSigningStorePass=${{ secrets.KEY_PASSWORD }}
      - name: Build F-Droid APK
        run: |
          dotnet publish src/LifeChart/LifeChart.csproj \
            -f net10.0-android \
            -c Release \
            /p:DefineConstants="FDROID" \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore=../../lifechart.keystore \
            /p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} \
            /p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} \
            /p:AndroidSigningStorePass=${{ secrets.KEY_PASSWORD }}
      - name: Upload APKs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: android-apks
          path: '**/*.apk'

  windows:
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: '0'
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'
      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@v4.5.0
      - name: BuilddirProps
        shell: bash
        env:
          DIRECTORYPROPS: ${{ secrets.DIRECTORYPROPS }}
        run: printf '%s' "$DIRECTORYPROPS" > src/Directory.Build.props.user
      - name: Install MAUI workload
        run: dotnet workload install maui-windows
      - name: Restore
        run: dotnet restore src/LifeChart/LifeChart.csproj
      - name: Build Windows
        run: |
          dotnet publish src/LifeChart/LifeChart.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            -o out/windows          
      - name: Archive Release Linux
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          filename: lifechart-windows-${{ env.majorMinorPatch }}.zip
          path: ./out/windows
          exclusions: '*.git*'
      - name: Upload ZIP
        uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: '**/*.zip'

  linux:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: '0'
      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: '10.0.x'
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'
      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@v4.5.0
      - name: BuilddirProps
        env:
          DIRECTORYPROPS: ${{ secrets.DIRECTORYPROPS }}
        run: printf '%s' "$DIRECTORYPROPS" > src/Directory.Build.props.user
      - name: Install MAUI workload
        run: dotnet workload install maui-tizen android
      - name: Install GTK4 runtime libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-1 \
            libglib2.0-0 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0
      - name: Publish Linux
        run: |
          dotnet publish src/LifeChart.Linux/LifeChart.Linux.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -o out/linux
      - name: Install dotnetpackager
        run: |
          dotnet tool install --global DotnetPackaging.Tool
      - name: Build DEB
        run: |
          dotnetpackager deb from-project \
            --project ./src/LifeChart.Linux/LifeChart.Linux.csproj \
            --appId com.github.saigkill.lifechart \
            --appName LifeChart \
            --summary "LifeChart is a simple and lightweight desktop application for tracking your daily activities and habits." \
            --output ./LifeChart_${{ env.majorMinorPatch }}_amd64.deb 
      - name: Build RPM
        run: |
          dotnetpackager rpm from-project \
            --project ./src/LifeChart.Linux/LifeChart.Linux.csproj \
            --appId com.github.saigkill.lifechart \
            --appName LifeChart \
            --summary "LifeChart is a simple and lightweight desktop application for tracking your daily activities and habits." \
            --output ./LifeChart-${{ env.majorMinorPatch }}.x86_64.rpm
      - name: Build AppImage
        run: |
          dotnetpackager appimage from-project \
            --project ./src/LifeChart.Linux/LifeChart.Linux.csproj \
            --appId com.github.saigkill.lifechart \
            --appName LifeChart \
            --summary "LifeChart is a simple and lightweight desktop application for tracking your daily activities and habits." \
            --output ./LifeChart-${{ env.majorMinorPatch }}.appimage
      - name: Archive Release Linux
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          filename: lifechart-linux-${{ env.majorMinorPatch }}.zip
          path: ./out/linux
          exclusions: '*.git*'
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: linux-artifacts
          path: |
            ./LifeChart_*.deb
            ./LifeChart-*.x86_64.rpm
            ./LifeChart-*.appimage
            ./lifechart-linux-*.zip

  release:
    runs-on: ubuntu-latest
    needs: [android, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: release-artifacts
      - uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-artifacts
      - uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/**/*.apk
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.appimage